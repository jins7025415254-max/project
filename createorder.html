{% extends "user/common_user.html" %}

{% block content %}
<br>
<h1 style="text-align: center;">Order Creation Form</h1>

<section class="contact-one contact-page">
    <div class="container" style="margin-left: 30%;">
        <div class="col-xl-6 col-lg-6">
            <div class="contact-one__right">
                <p>Product: {{ product.product_name }}</p>
                <p>Price: ${{ product.price }}</p>
                <!-- Order Creation Form -->
                <form method="POST">
                    {% csrf_token %}
                    <div class="row">
                        <div class="col-xl-6 col-lg-6 col-md-6">
                            <div class="contact-one__form-input-box">
                                <input type="text" placeholder="Name" name="name" required>
                            </div>
                        </div>
                        <div class="col-xl-6 col-lg-6 col-md-6">
                            <div class="contact-one__form-input-box">
                                <input type="text" placeholder="Phone" name="phone" pattern="[789][0-9]{9}" required>
                            </div>
                        </div>
                        <div class="col-xl-12">
                            <div class="contact-one__form-input-box">
                                <input type="text" placeholder="Address" name="address" required>
                            </div>
                        </div>
                        <div class="col-xl-6 col-lg-6 col-md-6">
                            <div class="contact-one__form-input-box">
                                <input type="text" placeholder="City" name="city" required>
                                <input type="hidden" placeholder="City" name="productid" value="{{ product.price }}" required>
                            </div>
                        </div>
                        <div class="col-xl-6 col-lg-6 col-md-6">
                            <div class="contact-one__form-input-box">
                                <input type="text" placeholder="State" name="state" required>
                            </div>
                        </div>
                        <div class="col-xl-6 col-lg-6 col-md-6">
                            <div class="contact-one__form-input-box">
                                <input type="text" placeholder="Postal Code" name="postal_code" required>
                            </div>
                        </div>
                        <div class="col-xl-6 col-lg-6 col-md-6">
                            <div class="contact-one__form-input-box">
                                <input type="text" placeholder="Country" name="country" required>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-xl-12">
                            <div class="contact-one__btn-box">
                                <button type="submit" class="thm-btn contact-one__btn">Create Order</button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
